name: Verify production release

on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: read

jobs:
  verify-production:
    # Vercel deploys on every main push. The script waits for the matching
    # Production deployment, then checks its SHA and the public alias.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Compare deployed commit and verify public production URL
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT_SHA: ${{ github.sha }}
        run: ./scripts/verify-prod.sh
